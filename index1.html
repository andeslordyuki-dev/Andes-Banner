<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lifetime Exploration - Andes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        /* Banner similar to lecture style */
        .banner { background-color: #fdfd96; border: 2px solid #000; padding: 25px; margin-bottom: 20px; border-radius: 8px; }
        .banner h2 { margin-top: 0; color: #333; }
        
        /* List Styling */
        #exploration-list { font-size: 1.1rem; line-height: 1.6; }
        
        /* Control Section */
        .controls { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="text"] { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #333; background: #fff; transition: 0.2s; }
        button:hover { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="banner" id="banner-container">
        <h2>Things I want to explore in my lifetime:</h2>
        <ul id="exploration-list">
            <li>Master Full-stack web development (PHP/JavaScript)</li>
            <li>Travel to Tokyo, Japan</li>
            <li>Scale my luxury watch resale business</li>
        </ul>
    </div>

    <div class="controls">
        <p><strong>Add New:</strong> 
            <input type="text" id="itemInput" placeholder="Enter a new life goal...">
        </p>
        
        <button onclick="addItem()">Add new item on the list</button>
        <button onclick="changeFont()">Change font family</button>
        <button onclick="toggleBold()">Make items bold</button>
    </div>

    <script>
        /**
         * DOCUMENTATION[cite: 10]:
         * addItem: Pulls value from the text input and appends a new list item to the DOM.
         * changeFont: Toggles the entire list's font-family between sans-serif and serif.
         * toggleBold: Toggles the font-weight between normal and bold.
         */

        function addItem() {
            const input = document.getElementById('itemInput');
            const list = document.getElementById('exploration-list');
            
            if (input.value.trim() !== "") {
                const newLi = document.createElement('li');
                newLi.textContent = input.value;
                list.appendChild(newLi);
                input.value = ""; // Clear input [cite: 12]
            }
        }

        function changeFont() {
            const list = document.getElementById('exploration-list');
            // Toggles between a modern sans-serif and a traditional serif [cite: 13]
            list.style.fontFamily = (list.style.fontFamily === "serif") ? "sans-serif" : "serif";
        }

        function toggleBold() {
            const list = document.getElementById('exploration-list');
            // Toggles bold styling [cite: 14]
            list.style.fontWeight = (list.style.fontWeight === "bold") ? "normal" : "bold";
        }
    </script>
</body>
</html>
